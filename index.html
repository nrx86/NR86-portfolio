<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404: Limits Not Found 🚀</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: url('Image.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      text-align: center;
      position: relative;
    }

    /* Overlay for readability */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    .container {
      z-index: 1;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 3.5rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 20px #00f7ff, 0 0 40px #00f7ff;
      animation: glow 2s infinite alternate;
    }

    p {
      margin: 20px 0;
      font-size: 1.2rem;
      color: #ddd;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(45deg, #00f7ff, #ef680d);
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 30px;
      box-shadow: 0 0 15px #00f7ff;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px #eb7105;
    }

    /* Animations */
    @keyframes glow {
      from { text-shadow: 0 0 20px #00f7ff; }
      to { text-shadow: 0 0 40px #e08618; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome🚀</h1>
    <p>Engineering Aspirant | Tech Enthusiast | Future Innovator</p>
    <a href="portfolio.html" class="btn">View My Portfolio</a>
  </div>
</body>
</html>
